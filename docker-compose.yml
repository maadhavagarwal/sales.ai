version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - WORKERS=4
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=/api/backend
    depends_on:
      - backend
    restart: always
